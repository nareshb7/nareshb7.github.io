<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="signup.css">
		<title>Sign In</title>
	</head>
	<body>
		<div class="wrapper">
			<form id="signUp">
				
				<div><input type="text" name='fName' placeholder="First Name"></div>
				<span id="fNameError"></span>
				<div><input type="text" name='lName' placeholder="Last Name"></div>
				<span id="lNameError"></span>
				<div><input type="text" name='mail' placeholder="Email Id"></div>
				<span id="mailError"></span>
				<div><input type="number" name='phone' placeholder="Mobile Number"></div>
				<span id="phoneError"></span>
				<div><input type="password" name='psd' placeholder="Password"></div>
				<span id="psdError"></span>
				<div><input type="password" name='conPsd' placeholder="Confirm Password"></div>
				<span id="conPsdError"></span>
				<div><button id="signIn">Sign In</button></div>
			</form>
			<div  ></div>
			<div id="existingUser">If u already have an Account<a href='../LogIn/login.html'>Click Here</a> </div>
			
		</div>


		<script src="signup.js"></script>
	</body>
</html>
